steps:
- name: 'python:3.11'
  id: 'install-backend'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      cd job/backend
      pip install -r ../requirements.txt
      echo "Backend dependencies installed"
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'deploy-backend-primary'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      gcloud compute ssh backend-mig-5fv5 \
        --zone=asia-south1-b \
        --tunnel-through-iap \
        --project=capstone-project-490610 \
        --command="cd /app/capstone && git pull origin main && cd job/backend && python3.11 -m pip install -r ../requirements.txt && pm2 restart backend --update-env && echo Deploy primary done"
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'deploy-backend-replica'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      VMS=$$(gcloud compute instances list \
        --filter="name~backend-mig" \
        --format="value(name,zone)" \
        --project=capstone-project-490610)
      echo "Found VMs: $$VMS"
      while IFS=$$'\t' read -r vm_name vm_zone; do
        echo "Deploying to $$vm_name in $$vm_zone"
        gcloud compute ssh $$vm_name \
          --zone=$$vm_zone \
          --tunnel-through-iap \
          --project=capstone-project-490610 \
          --command="cd /app/capstone && git pull origin main && cd job/backend && python3.11 -m pip install -r ../requirements.txt && pm2 restart backend --update-env && echo Done $$vm_name"
      done <<< "$$VMS"
- name: 'node:20'
  id: 'deploy-frontend'
  secretEnv: ['_FIREBASE_TOKEN']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      npm install -g firebase-tools
      cd job
      firebase deploy --only hosting \
        --project capstone-project-490610 \
        --token $$_FIREBASE_TOKEN
- name: 'gcr.io/cloud-builders/curl'
  id: 'verify'
  args:
    - '-f'
    - 'https://api.adesh.online/api/health'
availableSecrets:
  secretManager:
  - versionName: projects/capstone-project-490610/secrets/firebase-ci-token/versions/latest
    env: '_FIREBASE_TOKEN'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'
timeout: '1200s'

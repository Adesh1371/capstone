# ── GCP Cloud Run Deployment ────────────────────────────────────────────────
# 1. Build and push image
# gcloud auth configure-docker
# docker build -t gcr.io/YOUR_PROJECT_ID/shopflow .
# docker push gcr.io/YOUR_PROJECT_ID/shopflow
#
# 2. Deploy to Cloud Run
# gcloud run deploy shopflow \
#   --image gcr.io/YOUR_PROJECT_ID/shopflow \
#   --platform managed \
#   --region asia-south1 \
#   --allow-unauthenticated \
#   --port 8000 \
#   --memory 512Mi \
#   --cpu 1 \
#   --min-instances 0 \
#   --max-instances 10 \
#   --set-env-vars SECRET_KEY=your-secret,MONGODB_URL=your-url

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/shopflow', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/shopflow']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - shopflow
      - --image=gcr.io/$PROJECT_ID/shopflow
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=512Mi
      - --max-instances=10

images:
  - 'gcr.io/$PROJECT_ID/shopflow'

version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -r job/requirements.txt

  build:
    commands:
      - echo "Build started"
      - echo "Running tests..."

  post_build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - '**/*'
  base-directory: job
  discard-paths: no
